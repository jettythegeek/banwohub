# Banwolaw Hub — append to C:\xampp\apache\conf\extra\httpd-vhosts.conf
# Prerequisites in C:\xampp\apache\conf\httpd.conf:
#   LoadModule proxy_module modules/mod_proxy.so
#   LoadModule proxy_http_module modules/mod_proxy_http.so   (required for ProxyPass)
#   Include conf/extra/httpd-vhosts.conf
# Or run as Administrator: scripts\enable-xampp-proxy.ps1
#
# Windows hosts (run scripts/add-hosts-banwohub.ps1 as Administrator):
#   127.0.0.1 banwohub.test
#   127.0.0.1 api.banwohub.test   (optional)
#
# Backend: PHP 8.4+ — php artisan serve
# After editing: restart Apache in XAMPP Control Panel.

# Frontend (Vue/Vite :3000) + API (/api -> artisan serve :8000)
<VirtualHost *:80>
    ServerName banwohub.test
    ProxyPreserveHost On
    ProxyPass /api http://127.0.0.1:8000/api
    ProxyPassReverse /api http://127.0.0.1:8000/api
    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/
    ErrorLog "logs/banwohub.test-error.log"
    CustomLog "logs/banwohub.test-access.log" common
</VirtualHost>

# Optional dedicated API host (requires api.banwohub.test in hosts file)
<VirtualHost *:80>
    ServerName api.banwohub.test
    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:8000/
    ProxyPassReverse / http://127.0.0.1:8000/
    ErrorLog "logs/api.banwohub.test-error.log"
    CustomLog "logs/api.banwohub.test-access.log" common
</VirtualHost>
